<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/style.css">

<body class="dark-theme">
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <i data-lucide="building-2"></i>
        <span>Holding</span>
      </div>
      <nav class="nav-links">
        <a href="#dashboard" class="nav-item active" data-path="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a href="#imoveis" class="nav-item" data-path="imoveis"><i data-lucide="home"></i> Imóveis</a>
        <a href="#locacoes" class="nav-item" data-path="locacoes"><i data-lucide="users"></i> Locações</a>

        </div>

      <div id="content-area" class="content-scroll">
        <!-- Content injected here via JS -->
      </div>
    </main>
  </div>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
